[pytest]
# =============================================
# Cấu hình cơ bản
# =============================================
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Thư mục chứa test
testpaths = tests

# =============================================
# Markers
# =============================================
markers =
    integration: marks tests as integration tests
    slow: marks tests as slow running tests
    rag: marks tests related to RAG
    odoo: marks tests that require Odoo connection

# =============================================
# Filter Warnings
# =============================================
filterwarnings =
    ignore::DeprecationWarning:langchain_community
    ignore::DeprecationWarning:langchain
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

# =============================================
# Addopts (Tùy chọn mặc định khi chạy pytest)
# =============================================
addopts = 
    -q
    --tb=short
    --disable-warnings
    --strict-markers
    --ignore=scripts
    --ignore=run_chat.py
    --ignore=test_agent.py
    --ignore=test_rag.py

# =============================================
# Asyncio Configuration
# =============================================
asyncio_default_fixture_loop_scope = function

# =============================================
# Coverage (nếu sau này dùng)
# =============================================
